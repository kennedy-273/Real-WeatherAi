name: Build and deploy to GitHub Pages

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Diagnostic - Node / npm versions
        run: |
          node --version
          npm --version
          node -p "process.versions"

      - name: Diagnostic - Show workspace
        run: |
          pwd
          ls -la
          echo "node_modules listing (top 50)" && ls -la node_modules | head -n 50 || true


      - name: Install dependencies
        run: npm ci

      - name: Diagnostic - try importing lovable-tagger
        run: |
          node -e "(async()=>{try{const m=await import('lovable-tagger'); console.log('import ok', Object.keys(m).slice(0,10));}catch(e){console.error('import failed', e && e.stack ? e.stack : e); process.exit(0);} })()"

      - name: Build
        run: npm run build

      - name: Inspect dist output
        run: |
          echo "dist listing:" && ls -la dist || true

      - name: Select publish directory
        id: set_publish_dir
        run: |
          if [ -d "dist/client" ]; then
            echo "PUBLISH_DIR=dist/client" >> $GITHUB_OUTPUT
            echo "Selected dist/client"
          elif [ -d "dist" ]; then
            echo "PUBLISH_DIR=dist" >> $GITHUB_OUTPUT
            echo "Selected dist"
          else
            echo "PUBLISH_DIR=" >> $GITHUB_OUTPUT
            echo "No dist found"
          fi

      - name: Deploy to GitHub Pages
        if: steps.set_publish_dir.outputs.PUBLISH_DIR != ''
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ${{ steps.set_publish_dir.outputs.PUBLISH_DIR }}
          keep_files: true

      - name: Fail if no build output
        if: steps.set_publish_dir.outputs.PUBLISH_DIR == ''
        run: |
          echo "No build output found in dist or dist/client. Failing workflow." && exit 1
